<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloxDen Bot</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0c10;
  color: white;
  overflow-x: hidden;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #111218;
}

.logo {
  color: #5865F2;
  font-weight: bold;
}

/* HERO */
.hero {
  text-align: center;
  padding: 90px 20px;
}

.hero img {
  width: 120px;
  border-radius: 50%;
  border: 2px solid #5865F2;
  box-shadow: 0 0 20px rgba(88,101,242,0.5);
}

.hero h1 {
  font-size: 45px;
  margin: 15px 0;
}

.hero p {
  color: #aaa;
  max-width: 600px;
  margin: auto;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background: #5865F2;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}

/* STATUS */
.status {
  margin-top: 15px;
  color: #4ade80;
  font-size: 14px;
}

/* FEATURES */
.section {
  padding: 60px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
}

.card {
  background: #16171c;
  padding: 18px;
  width: 220px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  border: 1px solid #5865F2;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #111218;
  color: #777;
}
</style>
</head>

<body>

<nav>
  <div class="logo">BloxDen</div>
  <div>
    <a href="terms.html" style="color:white; margin-right:15px;">Terms</a>
    <a href="privacy.html" style="color:white;">Privacy</a>
  </div>
</nav>

<div class="hero">

  <img src="https://cdn.discordapp.com/avatars/1507972003481784421/1c5678b9835544ee472941d2ea463328.webp?size=4096">

  <h1>BloxDen Bot</h1>

  <p>Advanced Discord bot for moderation, fun, economy and Roblox tools.</p>

  <div class="status" id="status">● Online</div>

  <br>

  <a class="btn"
     href="https://discord.com/api/oauth2/authorize?client_id=1507972003481784421&scope=bot&permissions=8"
     target="_blank">
     Invite Bot
  </a>

</div>

<div class="section">
  <h2>Features</h2>

  <div class="cards">
    <div class="card">Moderation System</div>
    <div class="card">Fun Commands</div>
    <div class="card">Economy System</div>
    <div class="card">Roblox Tools</div>
    <div class="card">Auto Role System</div>
    <div class="card">24/7 Ready</div>
  </div>
</div>

<footer>
  © 2026 BloxDen Bot
</footer>

<script>
// 🔥 SIMPLE LIVE EFFECTS

// blinking status
setInterval(() => {
  const s = document.getElementById("status");
  s.style.opacity = s.style.opacity === "0.5" ? "1" : "0.5";
}, 800);

// smooth background movement effect
document.addEventListener("mousemove", (e) => {
  document.body.style.backgroundPosition =
    `${e.clientX / 50}px ${e.clientY / 50}px`;
});
</script>

</body>
</html>
