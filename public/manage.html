<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Server | BloxDen</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white min-h-screen p-6 md:p-10">
    
    <nav class="mb-8">
        <a href="/dashboard" class="text-blue-400 hover:text-blue-300 transition flex items-center">← Back to Dashboard</a>
    </nav>

    <h2 class="text-3xl font-bold mb-6">Manage Server Settings</h2>
    
    <div class="bg-[#1e293b] p-6 rounded-2xl border border-blue-900 max-w-lg shadow-xl space-y-6">
        <div>
            <label class="block mb-2 text-blue-300 font-semibold">Select Log Channel</label>
            <select id="channel-select" class="bg-slate-900 w-full p-3 rounded-lg border border-blue-800 text-white"></select>
        </div>

        <div>
            <label class="block mb-2 text-blue-300 font-semibold">Welcome Message</label>
            <p class="text-xs text-gray-400 mb-2">Use {user} to mention the new member.</p>
            <textarea id="welcome-msg" class="w-full bg-slate-900 p-3 rounded-lg border border-blue-800 text-white h-24"></textarea>
        </div>

        <div>
            <label class="block mb-2 text-blue-300 font-semibold">Goodbye Message</label>
            <p class="text-xs text-gray-400 mb-2">Use {user} to show their username.</p>
            <textarea id="goodbye-msg" class="w-full bg-slate-900 p-3 rounded-lg border border-blue-800 text-white h-24"></textarea>
        </div>
        
        <button id="save-btn" onclick="saveSettings()" class="bg-blue-600 hover:bg-blue-500 w-full px-6 py-3 rounded-lg font-bold transition shadow-lg">
            Save All Settings
        </button>
    </div>

    <script>
        const guildId = window.location.pathname.split('/')[2];

        // 1. Load Channels AND Current Settings on page load
        async function loadData() {
            // Load channels
            const chanRes = await fetch(`/api/channels/${guildId}`);
            const channels = await chanRes.json();
            const select = document.getElementById('channel-select');
            select.innerHTML = channels.map(c => `<option value="${c.id}">#${c.name}</option>`).join('');

            // Load saved settings
            const setRes = await fetch(`/api/settings/${guildId}`);
            const settings = await setRes.json();
            
            if (settings.logChannel) select.value = settings.logChannel;
            if (settings.welcomeMessage) document.getElementById('welcome-msg').value = settings.welcomeMessage;
            if (settings.goodbyeMessage) document.getElementById('goodbye-msg').value = settings.goodbyeMessage;
        }

        // 2. Save all settings
        async function saveSettings() {
            const btn = document.getElementById('save-btn');
            btn.innerText = 'Saving...';
            btn.disabled = true;

            const response = await fetch(`/api/settings/${guildId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    logChannel: document.getElementById('channel-select').value,
                    welcomeMessage: document.getElementById('welcome-msg').value,
                    goodbyeMessage: document.getElementById('goodbye-msg').value
                })
            });

            if (response.ok) {
                alert('Settings Saved Successfully!');
            }
            btn.innerText = 'Save All Settings';
            btn.disabled = false;
        }

        loadData();
    </script>
</body>
</html>
