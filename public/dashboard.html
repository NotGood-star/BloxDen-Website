<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>BloxDen Dashboard</title>
</head>
<body class="bg-[#0f172a] text-white min-h-screen p-6 md:p-12">

    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-12">
        <h1 class="text-2xl font-black italic text-blue-400">BloxDen</h1>
        <div id="user-info" class="flex items-center gap-4 bg-slate-800 p-2 rounded-2xl pr-4">
            <div class="w-8 h-8 rounded-full bg-blue-900 animate-pulse"></div>
            <span class="text-sm">Loading profile...</span>
            <a href="/logout" class="bg-red-900/30 hover:bg-red-900 text-red-200 px-3 py-1 rounded-lg text-xs ml-2 transition">Logout</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto">
        <h2 class="text-3xl font-bold mb-8">Your Servers</h2>
        <div id="server-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <p id="loading" class="text-blue-300 italic">Fetching your servers...</p>
        </div>
    </main>

    <script>
        // 1. Fetch User Info
        fetch('/api/user')
            .then(res => res.json())
            .then(user => {
                const avatar = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                document.getElementById('user-info').innerHTML = `
                    <img src="${avatar}" class="w-8 h-8 rounded-full">
                    <span class="text-sm font-semibold">${user.username}</span>
                    <a href="/logout" class="bg-red-900/30 hover:bg-red-900 text-red-200 px-3 py-1 rounded-lg text-xs ml-2 transition">Logout</a>
                `;
            });

        // 2. Fetch Servers
        fetch('/api/servers')
            .then(res => res.json())
            .then(servers => {
                const list = document.getElementById('server-list');
                document.getElementById('loading').style.display = 'none';

                if (servers.length === 0) {
                    list.innerHTML = '<p class="text-blue-200">No servers found with Manage permissions.</p>';
                    return;
                }

                list.innerHTML = servers.map(s => `
                    <div class="bg-[#1e293b] p-6 rounded-2xl border border-blue-900 hover:border-blue-500 transition">
                        <img src="${s.icon ? `https://cdn.discordapp.com/icons/${s.id}/${s.icon}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png'}" 
                             class="w-16 h-16 rounded-full mb-4 border-2 border-blue-900">
                        <h3 class="font-bold text-lg mb-4 truncate">${s.name}</h3>
                        <a href="/manage/${s.id}" class="text-blue-400 hover:text-white font-medium transition">Manage Settings →</a>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
