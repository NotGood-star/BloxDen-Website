<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>BloxDen Dashboard</title>
</head>
<body class="bg-[#0f172a] text-white min-h-screen p-8">

    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-12">
        <h1 class="text-2xl font-black italic text-blue-400">BloxDen Dashboard</h1>
        <a href="/logout" class="bg-red-900/50 hover:bg-red-800 px-4 py-2 rounded-lg text-sm">Logout</a>
    </nav>

    <main class="max-w-6xl mx-auto">
        <h2 class="text-3xl font-bold mb-8">Select a Server to Manage</h2>
        
        <!-- This grid will hold your servers -->
        <div id="server-list" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Example Server Card -->
            <div class="bg-[#1e293b] p-6 rounded-2xl border border-blue-900 hover:border-blue-500 transition">
                <div class="w-16 h-16 bg-blue-900 rounded-full mb-4"></div>
                <h3 class="font-bold text-lg">My Community Server</h3>
                <a href="#" class="mt-4 inline-block text-blue-400 hover:underline">Manage Settings →</a>
            </div>
        </div>
    </main>

</body>
</html>
