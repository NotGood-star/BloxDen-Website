<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxDen | Stay Cheerful</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff71ce, #01cdfe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; text-shadow: 2px 2px #b967ff; }
        p { font-size: 1.2rem; opacity: 0.9; }
        .footer { margin-top: 2rem; font-weight: bold; color: #ffeb3b; }
    </style>
</head>
<body>

    <div class="container">
        <h1>BloxDen</h1>
        <p>Bringing the perfect mix of <b>Pink</b> and <b>Blue</b> vibes to your community!</p>
        <div class="footer">Stay Cheerful! ✨</div>
    </div>

</body>
</html>
