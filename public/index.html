<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-[#0f172a] text-white font-sans">

    <!-- Hero Section (Visible immediately) -->
    <header class="text-center py-20 px-4">
        <h1 class="text-5xl font-black mb-4">BloxDen Bot</h1>
        <p class="text-blue-200 mb-8">Manage, grow, and entertain your community.</p>
    </header>

    <!-- Features Section (Reveals on scroll) -->
    <section class="reveal py-16 px-4 max-w-5xl mx-auto" id="features">
        <h3 class="text-3xl font-bold text-center mb-12">Our Features</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-[#1e293b] p-6 rounded-2xl border border-blue-900 cursor-pointer" onclick="toggleDetails(this)">
                <div class="text-4xl mb-4 text-center">🛡️</div>
                <h4 class="text-blue-300 font-bold mb-2 text-center">Moderation</h4>
                <p class="text-sm text-blue-100 hidden details">Automated moderation and logs.</p>
            </div>
            <div class="bg-[#1e293b] p-6 rounded-2xl border border-blue-900 cursor-pointer" onclick="toggleDetails(this)">
                <div class="text-4xl mb-4 text-center">💰</div>
                <h4 class="text-blue-300 font-bold mb-2 text-center">Economy</h4>
                <p class="text-sm text-blue-100 hidden details">Currency and leveling system.</p>
            </div>
            <div class="bg-[#1e293b] p-6 rounded-2xl border border-blue-900 cursor-pointer" onclick="toggleDetails(this)">
                <div class="text-4xl mb-4 text-center">🎟️</div>
                <h4 class="text-blue-300 font-bold mb-2 text-center">Tickets</h4>
                <p class="text-sm text-blue-100 hidden details">Seamless support ticketing.</p>
            </div>
            <div class="bg-[#1e293b] p-6 rounded-2xl border border-blue-900 cursor-pointer" onclick="toggleDetails(this)">
                <div class="text-4xl mb-4 text-center">🎁</div>
                <h4 class="text-blue-300 font-bold mb-2 text-center">Giveaway</h4>
                <p class="text-sm text-blue-100 hidden details">Host epic giveaways.</p>
            </div>
        </div>
    </section>

    <!-- Why Choose Us (Reveals on scroll) -->
    <section class="reveal text-center py-16 px-4">
        <h2 class="text-5xl font-black mb-8 text-blue-400">Why to choose us?</h2>
    </section>

    <script>
        // Reveal on Scroll
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.reveal').forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 100) {
                    el.classList.add('active');
                }
            });
        });

        // Toggle Details
        function toggleDetails(card) {
            card.querySelector('.details').classList.toggle('hidden');
        }
    </script>
</body>
</html>
